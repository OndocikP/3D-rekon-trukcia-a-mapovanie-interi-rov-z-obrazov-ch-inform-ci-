version: '3.8'

services:
  # Backend API - iba backend, bez databázy (tá je v Supabase)
  backend:
    build:
      context: ./Back-end
      dockerfile: Dockerfile
    container_name: rekon_backend_prod
    environment:
      # Supabase Cloud Database - nastaviť v .env
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      
      # JWT
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # Server
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:8081
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Netreba volumes pretože databáza je v Supabase
    command: sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  # pgAdmin - OPTIONAL - pre spravovanie Supabase databázy
