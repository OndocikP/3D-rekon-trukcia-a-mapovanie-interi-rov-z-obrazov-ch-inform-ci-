version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 3d-rekon-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - PROJECTS_PATH=/app/projects
    volumes:
      - ./projects:/app/projects
      - ./main.py:/app/main.py
      - ./generate_3d_models.py:/app/generate_3d_models.py
      - ./worker_3d_models.py:/app/worker_3d_models.py
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - 3d-rekon-network

  # Nerfstudio Worker (batch training v pozadí)
  nerfstudio-worker:
    build:
      context: .
      dockerfile: Dockerfile.nerfstudio
    container_name: 3d-rekon-nerfstudio-worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - PROJECTS_PATH=/app/projects
    volumes:
      - ./projects:/app/projects
      - ./generate_3d_models.py:/app/generate_3d_models.py
      - ./worker_3d_models.py:/app/worker_3d_models.py
      - /app/projects/outputs  # Veľké training dáta
    command: python generate_3d_models.py
    networks:
      - 3d-rekon-network
    # Bezpečnostné nastavenia
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G

  # PostgreSQL Database (optional - ak sa nepoužíva cloud Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: 3d-rekon-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: 3d_rekon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - 3d-rekon-network
    # Ak sa nepoužíva Supabase Cloud, odhlas services dependency:
    # Inak by to bolo:
    # profiles: ["local-db"]

networks:
  3d-rekon-network:
    driver: bridge

volumes:
  postgres_data:
